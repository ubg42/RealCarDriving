        function ToggleFullScreen() {
            var isInFullScreen = (document.fullscreenElement && document.fullscreenElement !== null) ||
            (document.webkitFullscreenElement && document.webkitFullscreenElement !== null) ||
            (document.msFullscreenElement && document.msFullscreenElement !== null);
            
            var element = document.body.getElementsByClassName("webgl-content")[0];
            
            if (!isInFullScreen) {
                if (element.webkitRequestFullscreen) {
                    element.webkitRequestFullscreen();
                } else if (element.msRequestFullscreen) { 
                    element.msRequestFullscreen();
                } else if (element.requestFullscreen) {

            else {

        function CheckCompatibility() {
            if (!hasWebGL()){
                document.getElementById("errorBrowserBlock").style.display = "inherit";

        function hasWebGL() {
            var supported;
            try {
                var canvas = document.createElement('canvas');
                supported = !! window.WebGLRenderingContext && (canvas.getContext('webgl') || canvas.getContext('experimental-webgl'));
            } catch(e) { supported = false; }

            try {
                eval('let foo = 123;');
            } catch (e) { supported = false; }
            canvas = undefined;
            return supported;

        async function loadDataFile() {
            const parts = [
                buildUrl + "/0aff4ee936778b905d874c8c2fb40213.data.unityweb.part1",
                buildUrl + "/0aff4ee936778b905d874c8c2fb40213.data.unityweb.part2",
                buildUrl + "/0aff4ee936778b905d874c8c2fb40213.data.unityweb.part3",
                buildUrl + "/0aff4ee936778b905d874c8c2fb40213.data.unityweb.part4",
                buildUrl + "/0aff4ee936778b905d874c8c2fb40213.data.unityweb.part5"
            ];

            let buffers = [];
            for (let url of parts) {
                const resp = await fetch(url);
                const buf = await resp.arrayBuffer();
                buffers.push(buf);
            }

            let totalLength = buffers.reduce((a, b) => a + b.byteLength, 0);
            let tmp = new Uint8Array(totalLength);
            let offset = 0;
            for (let b of buffers) {
                tmp.set(new Uint8Array(b), offset);
                offset += b.byteLength;
            }

            let blob = new Blob([tmp]);
            config.dataUrl = URL.createObjectURL(blob);
        }

        async function loadGame() {
            await loadDataFile();

            var script = document.createElement("script");
            script.src = loaderUrl;
            script.onload = () => {

                }).catch((message) => {

                });
            };
            document.body.appendChild(script);
        }

        loadGame();

<script>
  (function () {
    const showDelay = 2000; // 2 seconds delay before first show
    const countdownStart = 12; // 12 seconds countdown
    const reappearDelay = 25000; // 25 seconds before reappearance
    const adContainer = document.getElementById('ad-container');
    const closeBtn = document.getElementById('close-ad');

    function showAd() {
      // Show ad with smooth slide-in
      adContainer.style.display = 'block';
      adContainer.classList.remove('hidden');
      adContainer.setAttribute('aria-hidden', 'false');

      // Start countdown
      let timeLeft = countdownStart;
      closeBtn.textContent = `Close (${timeLeft})`;
      closeBtn.disabled = true;
      closeBtn.classList.remove('enabled');

      const t = setInterval(() => {
        timeLeft--;
        if (timeLeft > 0) {
          closeBtn.textContent = `Close (${timeLeft})`;
        } else {
          clearInterval(t);
          closeBtn.disabled = false;
          closeBtn.classList.add('enabled');
          closeBtn.textContent = 'Close ↑';
        }
      }, 1000);
    }

    // Initial ad show
    setTimeout(showAd, showDelay);

    // Close with animation and schedule reappearance
    closeBtn.addEventListener('click', () => {
      if (closeBtn.disabled) return;
      adContainer.classList.add('hidden');
      adContainer.setAttribute('aria-hidden', 'true');
      // Schedule reappearance without removing or reloading iframe
      setTimeout(showAd, reappearDelay);
    });
  })();
</script>
